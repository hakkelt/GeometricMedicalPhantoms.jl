name: Build CLI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build CLI - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            artifact-name: geomphantoms-linux-x86_64.tar.xz
            exe-name: geomphantoms
            julia-cpu-target: "generic;sandybridge,-xsaveopt,clone_all;haswell,-rdrnd,base(1);x86-64-v4,-rdrnd,base(1)"
          - os: ubuntu-24.04-arm64
            arch: aarch64
            artifact-name: geomphantoms-linux-aarch64.tar.xz
            exe-name: geomphantoms
            julia-cpu-target: "generic;cortex-a57;thunderx2t99;carmel,clone_all;apple-m1,base(3);neoverse-512tvb,base(3)"
          - os: macos-15-intel
            arch: x86_64
            artifact-name: geomphantoms-macos-x86_64.tar.xz
            exe-name: geomphantoms
            julia-cpu-target: "generic;sandybridge,-xsaveopt,clone_all;haswell,-rdrnd,base(1);x86-64-v4,-rdrnd,base(1)"
          - os: macos-latest
            arch: aarch64
            artifact-name: geomphantoms-macos-aarch64.tar.xz
            exe-name: geomphantoms
            julia-cpu-target: "generic;apple-m1,clone_all"
          - os: windows-latest
            arch: x86_64
            artifact-name: geomphantoms-windows-x86_64.zip
            exe-name: geomphantoms.exe
            julia-cpu-target: "generic;sandybridge,-xsaveopt,clone_all;haswell,-rdrnd,base(1);x86-64-v4,-rdrnd,base(1)"

    env:
      JULIA_CPU_TARGET: ${{ matrix.julia-cpu-target }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup Julia
        uses: julia-actions/setup-julia@v2
        with:
          version: '1.12'

      - name: Install JuliaC
        run: |
          julia -e 'using Pkg; Pkg.add(Pkg.PackageSpec(name="JuliaC", rev="d801470"))'

      - name: Prepare CLI app dependencies (non-Windows)
        if: runner.os != 'Windows'
        working-directory: app
        run: |
          julia --project=. -e 'using Pkg; Pkg.instantiate()'

      - name: Remove GIFImages and instantiate (Windows)
        if: runner.os == 'Windows'
        working-directory: app
        run: |
          julia --project=. -e 'using Pkg; Pkg.rm("GIFImages"); Pkg.instantiate()'

      - name: Build CLI executable
        working-directory: app
        run: |
          julia --project=. build.jl

      - name: Test executable
        working-directory: app
        run: |
          ./build/bin/${{ matrix.exe-name }} info

      - name: Run compiled binary integration tests
        working-directory: app
        run: |
          julia --project=. test/test_compiled_binary.jl ./build/bin/${{ matrix.exe-name }}

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        working-directory: app
        run: |
          tar -cjf ../${{ matrix.artifact-name }} build 

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        working-directory: app
        shell: pwsh
        run: |
          Compress-Archive -Path * -DestinationPath ../${{ matrix.artifact-name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-name }}

      - name: Upload release asset
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
